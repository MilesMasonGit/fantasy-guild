<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Guild</title>
  <meta name="description"
    content="An idle game where you manage a guild of heroes completing tasks, crafting, and defending against invasions." />
  <!-- Fonts are self-hosted from /public/fonts and declared in src/styles/main.css
       so the desktop build works offline. Do not re-add Google Fonts links here. -->
  <link rel="preload" href="/fonts/pixelify-sans-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/silkscreen-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
</head>

<body>
  <div id="boot-splash"
    style="position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #0d0f14; transition: opacity 0.3s ease;">
    <div style="text-align: center; color: #d8c98f; font-family: 'Silkscreen', monospace;">
      <div style="font-size: 26px; letter-spacing: 0.18em;">FANTASY GUILD</div>
      <div style="margin-top: 14px; font-size: 11px; opacity: 0.55; letter-spacing: 0.3em;">LOADING</div>
    </div>
  </div>
  <div id="react-root"></div>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
